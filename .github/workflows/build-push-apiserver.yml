name: Build and push API Server
 
on: workflow_dispatch # 手动触发
 
jobs:
  build-and-push:
      if: ${{ github.ref == 'refs/heads/master' && github.repository == 'CnGal/CnGalWebSite' }}  # 检测master分支是否有更新
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Login to DockerHub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Generate timestamp tag
          id: timestamp
          run: echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
               
        - name: build API Server and push to Dockerhub
          uses: docker/build-push-action@v7
          with:
            context: .
            file: ./CnGalWebSite/CnGalWebSite.APIServer/Dockerfile # Dockerfile 位置
            push: true
            cache-from: type=gha
            cache-to: type=gha,mode=max
            tags: |
              littlefishtentears/cngalwebsiteapiserver:latest
              littlefishtentears/cngalwebsiteapiserver:${{ steps.timestamp.outputs.tag }}
