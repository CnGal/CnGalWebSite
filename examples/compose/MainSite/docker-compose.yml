services:
  mainsite:
    image: littlefishtentears/cngalwebsite-mainsite:${IMAGE_TAG:-latest}
    container_name: mainsite
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # 后端API
      - MainSiteApi__BaseAddress=${WebApiPath:-https://api.cngal.org/}
      # 图床API
      - MainSiteApi__ImageApiPath=${ImageApiPath:-https://api.cngal.top/}
      # 定时任务API
      - MainSiteApi__TaskApiPath=${TaskApiPath}
      # OIDC 鉴权
      - Oidc__Authority=${Authority:-https://oauth2.cngal.org}
      - Oidc__ClientId=${ClientId}
      - Oidc__ClientSecret=${ClientSecret}
      - Oidc__RequireHttpsMetadata=${RequireHttpsMetadata:-true}
    hostname: mainsite
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${RESOURCES_LIMITS_MEMORY:-1.5G}
    ports:
      - "2010:8080"
      # - "3010:8081"
    volumes:
      - mainsite-DataProtection-Keys:/home/app/.aspnet/DataProtection-Keys
    labels:
      # watchtower
      - com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-true}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 10
    networks:
      - web

volumes:
  mainsite-DataProtection-Keys:

networks:
  web:
    external: true
